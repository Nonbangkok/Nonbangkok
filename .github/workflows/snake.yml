name: generate animation

# Defines when the automation will run
on:
  schedule:
    # Runs automatically every 12 hours
    - cron: "0 */12 * * *" 
  
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch:
  
  # Runs every time you push code to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Step 1: Uses the 'snk' action to generate the snake SVG files based on your contributions
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 2: Takes the generated SVGs from the 'dist' folder and pushes them to a separate branch called 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}